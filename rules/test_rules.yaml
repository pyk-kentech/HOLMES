      event_type: "file_to_ip"
    severity: 1

  - rule_id: TEST_PROC_TO_PROC
    name: "Test rule: match proc_to_proc"
    source_types: ["process"]
    target_types: ["process"]
    prerequisites: ["shared_entity"]
    event_predicate:
      event_type: "proc_to_proc"
    severity: 1
